name: build
on:
  pull_request:
  push:
    branches: [main, production-roadmap]

jobs:
  build:
    runs-on: ubuntu-22.04
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y make gcc libc6-dev
      - run: cd src && make
      - name: Sanity-check exported hook count
        run: |
          set +e
          echo "==== cu* symbols (global text only) ===="
          nm -D src/libnvshare.so | grep -E ' T cu' | sort
          CU_COUNT=$(nm -D src/libnvshare.so | grep -E ' T cu' | wc -l)
          echo "==== count of global text cu* symbols: $CU_COUNT ===="
          # Symbols may carry a _v2/_v3 suffix (from cuda.h #defines) and/or
          # a @@VERSION tag (from libnvshare-symbols.ld). Match leniently.
          MISSING=0
          # cuMemAllocManaged and cuCtxSynchronize are intentionally
          # pass-through (used as real_* pointers from inside other
          # hooks), so they are NOT exported as nvshare hooks.
          for s in cuMemAlloc cuMemFree cuMemGetInfo \
                   cuLaunchKernel cuMemcpy cuMemcpyAsync \
                   cuGetProcAddress cuMemMap cuMemCreate cuMemAllocAsync \
                   cuMemPrefetchAsync; do
            if nm -D src/libnvshare.so | grep -qE " T ${s}(_v[0-9]+)?(@@|$)"; then
              echo "  OK  $s"
            else
              echo "  MISSING  $s"
              MISSING=1
            fi
          done
          test "$CU_COUNT" -ge 25 || { echo "FAIL: too few cu* symbols ($CU_COUNT < 25)"; exit 1; }
          test "$MISSING" = "0" || { echo "FAIL: required hook(s) missing"; exit 1; }
          echo "OK: all required hooks exported, $CU_COUNT total cu* symbols"
      - name: Run dispatch smoke test (no-GPU permitted)
        run: bash tests/test_dispatch_v2.sh || true
