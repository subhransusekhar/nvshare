name: release
on:
  push:
    tags: ['v*']
    branches: [production-roadmap]

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless OIDC

jobs:
  publish:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        image: [scheduler, libnvshare, device_plugin]
        include:
          - image: libnvshare
            target: dist
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: |
            ghcr.io/subhransusekhar/nvshare-${{ matrix.image }}:m0
            ghcr.io/subhransusekhar/nvshare-${{ matrix.image }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ghcr.io/subhransusekhar/nvshare-${{ matrix.image }}@${{ steps.build.outputs.digest }}
